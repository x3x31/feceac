<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Painel | FECEAC</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/painel.css">
</head>
<body class="painel-bg">
  <nav class="navbar bg-white border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand text-success" href="painel.html"><img src="assets/logos/feceac.jpeg" alt="Logo FECEAC" class="img-fluid" style="max-width: 120px;"></a>
      <button id="btnLogout" class="btn btn-outline-danger btn-sm">Sair</button>
    </div>
  </nav>
  <main class="app-shell d-flex">
    <aside class="sidebar p-3">
      <nav class="nav flex-column">
        <a class="nav-link active" href="painel.html">Painel</a>
        <a class="nav-link" href="projetos.html">Projetos</a>
        <a class="nav-link" href="usuarios.html">Usuários</a>
        <a class="nav-link" href="professores.html">Professores</a>
        <a class="nav-link" href="alunos.html">Alunos</a>
        <a class="nav-link" href="avaliacoes.html">Avaliações</a>
        <a class="nav-link" href="areas.html">Áreas</a>
        <a class="nav-link" href="criterios.html">Critérios</a>
        <a class="nav-link" href="ranking.html">Ranking</a>
        <a class="nav-link" href="ficha-avaliacao.html">Ficha de Avaliação</a>
      </nav>
    </aside>
    <section class="content-area flex-grow-1">
      <div class="painel-welcome mb-4">
        <div class="painel-welcome-inner">
          <div class="d-flex align-items-center gap-3">
            <div class="painel-welcome-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="#fff" viewBox="0 0 16 16"><path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H4s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/></svg>
            </div>
            <div>
              <h1 class="painel-welcome-title">Bem-vindo(a), <span id="nomeUsuario">...</span></h1>
              <p class="painel-welcome-sub"><span id="tipoUsuario" class="painel-welcome-badge">...</span></p>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-3 col-6">
          <div class="card painel-stat-card">
            <div class="card-body text-center">
              <div class="painel-stat-icon painel-stat-projetos">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h2.764c.958 0 1.76.56 2.311 1.184C7.985 3.648 8.48 4 9 4h4.5A1.5 1.5 0 0 1 15 5.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 12.5v-9zM2.5 3a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5h11a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.5-.5H9c-.964 0-1.71-.605-2.264-1.264A.5.5 0 0 0 6.264 3H2.5z"/></svg>
              </div>
              <p class="painel-stat-label">Projetos</p>
              <strong id="totalProjetos" class="painel-stat-num">0</strong>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card painel-stat-card">
            <div class="card-body text-center">
              <div class="painel-stat-icon painel-stat-usuarios">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M15 14s1 0 1-1-1-4-5-4-5 3-5 4 1 1 1 1zm-7.978-1A.261.261 0 0 1 7 12.996c.001-.264.167-1.03.76-1.72C8.312 10.629 9.282 10 11 10c1.717 0 2.687.63 3.24 1.276.593.69.758 1.457.76 1.72l-.008.002a.274.274 0 0 1-.014.002H7.022zM11 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4m3-2a3 3 0 1 1-6 0 3 3 0 0 1 6 0M6.936 9.28a5.88 5.88 0 0 0-1.23-.247A7.35 7.35 0 0 0 5 9c-4 0-5 3-5 4 0 .667.333 1 1 1h4.216A2.238 2.238 0 0 1 5 13c0-.274.034-.54.1-.816zm6.018-1.184A5.8 5.8 0 0 0 13 7c0-1-.25-2.5-2-4 .756.832 1.242 2.338 1.242 4 0 .273-.027.537-.082.796z"/></svg>
              </div>
              <p class="painel-stat-label">Usuários</p>
              <strong id="totalUsuarios" class="painel-stat-num">0</strong>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card painel-stat-card">
            <div class="card-body text-center">
              <div class="painel-stat-icon painel-stat-avaliacoes">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M10.868 2.884c-.321-.772-1.415-.772-1.736 0l-1.83 4.401-4.753.381c-.833.067-1.171 1.107-.536 1.651l3.62 3.102 1.106 4.637c.194.813.73 1.383 1.35 1.473L8 12.595l4.162 2.556c.62.09 1.156-.48 1.35-1.293l1.106-4.637 3.62-3.102c.635-.544.297-1.584-.536-1.65l-4.752-.382z"/></svg>
              </div>
              <p class="painel-stat-label">Avaliações</p>
              <strong id="totalAvaliacoes" class="painel-stat-num">0</strong>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card painel-stat-card">
            <div class="card-body text-center">
              <div class="painel-stat-icon painel-stat-professores">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6m-5.784 6A2.238 2.238 0 0 1 8 13c0-1.355.68-2.75 1.936-3.72A6.325 6.325 0 0 0 8 4c-1 0-3 1-4 3 1 .5 2 2 2 3a2.24 2.24 0 0 1-1.784 2z"/></svg>
              </div>
              <p class="painel-stat-label">Professores</p>
              <strong id="totalProfessores" class="painel-stat-num">0</strong>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-3 col-6">
          <div class="card painel-stat-card">
            <div class="card-body text-center">
              <div class="painel-stat-icon painel-stat-alunos">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M2 2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2zm4.5 0a.5.5 0 0 0 0 1h3a.5.5 0 0 0 0-1zM8 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6m-1 4v-1h2v1a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1"/></svg>
              </div>
              <p class="painel-stat-label">Alunos</p>
              <strong id="totalAlunos" class="painel-stat-num">0</strong>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card painel-stat-card">
            <div class="card-body text-center">
              <div class="painel-stat-icon painel-stat-areas">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M1 2.828c.885-.37 2.154-.769 3.388-.893 1.33-.134 2.458.063 3.112.752v9.746c-.935-.53-2.12-.603-3.213-.493-1.18.12-2.37.461-3.287.811zm7.5-.141c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783"/></svg>
              </div>
              <p class="painel-stat-label">Áreas</p>
              <strong id="totalAreas" class="painel-stat-num">0</strong>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card painel-stat-card">
            <div class="card-body text-center">
              <div class="painel-stat-icon painel-stat-criterios">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M2 2v4.586l7 7L13.586 9l-7-7zM1 2a2 2 0 0 1 2-2h4.586a1 1 0 0 1 .707.293l7 7a1 1 0 0 1 0 1.414l-4.586 4.586a1 1 0 0 1-1.414 0l-7-7A1 1 0 0 1 1.707 7.293z"/><path d="M4.5 5a.5.5 0 1 1 0-1 .5.5 0 0 1 0 1m0-1A1.5 1.5 0 1 0 3 5.5 1.5 1.5 0 0 0 4.5 4"/></svg>
              </div>
              <p class="painel-stat-label">Critérios</p>
              <strong id="totalCriterios" class="painel-stat-num">0</strong>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-6">
          <div class="card painel-stat-card">
            <div class="card-body text-center">
              <div class="painel-stat-icon painel-stat-tipos">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16"><path d="M0 2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm15 2h-4v3h4zM4 4v3h4V4zm-4 7v-3h4v3zm5 0v3h4v-3z"/></svg>
              </div>
              <p class="painel-stat-label">Tipos</p>
              <strong id="totalTipos" class="painel-stat-num">0</strong>
            </div>
          </div>
        </div>
      </div>

      <h5 class="text-white mb-3" style="text-shadow: 0 1px 3px rgba(0,0,0,.3);">Acesso Rápido</h5>
      <div class="row g-3 dashboard-actions">
        <div class="col-md-3 col-6"><a class="btn painel-action-btn painel-action-projetos w-100" href="projetos.html">Projetos</a></div>
        <div class="col-md-3 col-6"><a class="btn painel-action-btn painel-action-usuarios w-100" href="usuarios.html">Usuários</a></div>
        <div class="col-md-3 col-6"><a class="btn painel-action-btn painel-action-avaliacoes w-100" href="avaliacoes.html">Avaliações</a></div>
        <div class="col-md-3 col-6"><a class="btn painel-action-btn painel-action-ranking w-100" href="ranking.html">Ranking</a></div>
        <div class="col-md-3 col-6"><a class="btn painel-action-btn painel-action-ficha w-100" href="ficha-avaliacao.html">Ficha Avaliação</a></div>
        <div class="col-md-3 col-6"><button class="btn painel-action-btn painel-action-sair w-100" type="button" onclick="document.querySelector('#btnLogout').click()">Sair</button></div>
      </div>
    </section>
  </main>
  <script src="js/vendor/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/controllers/painel.controller.js"></script>
</body>
</html>
