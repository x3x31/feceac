<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Painel | FECEAC</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/painel.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand text-success" href="painel.html"><img src="assets/logos/feceac.jpeg" alt="Logo FECEAC" class="img-fluid" style="max-width: 120px;"></a>
      <button id="btnLogout" class="btn btn-outline-danger btn-sm">Sair</button>
    </div>
  </nav>
  <main class="app-shell d-flex">
    <aside class="sidebar p-3">
      <nav class="nav flex-column">
        <a class="nav-link active" href="painel.html">Painel</a>
        <a class="nav-link" href="projetos.html">Projetos</a>
        <a class="nav-link" href="usuarios.html">Usuários</a>
        <a class="nav-link" href="avaliacoes.html">Avaliações</a>
        <a class="nav-link" href="ranking.html">Ranking</a>
        <a class="nav-link" href="areas.html">Áreas</a>
        <a class="nav-link" href="criterios.html">Critérios</a>
      </nav>
    </aside>
    <section class="content-area flex-grow-1">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-4">
        <div>
          <h1 class="page-title mb-1">Painel</h1>
          <p class="mb-0 text-secondary">Olá, <strong id="nomeUsuario">...</strong></p>
        </div>
        <span id="tipoUsuario" class="badge rounded-pill user-badge px-3 py-2">...</span>
      </div>
      <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="card stat-card"><div class="card-body"><p class="text-secondary mb-1">Projetos</p><strong id="totalProjetos" class="fs-3">0</strong></div></div></div>
        <div class="col-md-4"><div class="card stat-card"><div class="card-body"><p class="text-secondary mb-1">Usuários</p><strong id="totalUsuarios" class="fs-3">0</strong></div></div></div>
        <div class="col-md-4"><div class="card stat-card"><div class="card-body"><p class="text-secondary mb-1">Avaliações</p><strong id="totalAvaliacoes" class="fs-3">0</strong></div></div></div>
      </div>
      <div class="row g-3 dashboard-actions">
        <div class="col-md-3"><a class="btn btn-primary w-100 d-flex align-items-center justify-content-center" href="projetos.html">Projetos</a></div>
        <div class="col-md-3"><a class="btn btn-outline-primary w-100 d-flex align-items-center justify-content-center" href="usuarios.html">Usuários</a></div>
        <div class="col-md-3"><a class="btn btn-outline-primary w-100 d-flex align-items-center justify-content-center" href="avaliacoes.html">Avaliações</a></div>
        <div class="col-md-3"><a class="btn btn-outline-primary w-100 d-flex align-items-center justify-content-center" href="ranking.html">Ranking</a></div>
        <div class="col-md-3"><button class="btn btn-outline-danger w-100 h-100" type="button" onclick="document.querySelector('#btnLogout').click()">Sair</button></div>
      </div>
    </section>
  </main>
  <script src="js/vendor/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/controllers/painel.controller.js"></script>
</body>
</html>
