<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ranking | FECEAC</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tabelas.css">
</head>
<body>
  <nav class="navbar bg-white border-bottom"><div class="container-fluid"><a class="navbar-brand text-success" href="painel.html"><img src="assets/logos/feceac.jpeg" alt="Logo FECEAC" class="img-fluid" style="max-width: 120px;"></a><button id="btnLogout" class="btn btn-outline-danger btn-sm">Sair</button></div></nav>
  <main class="app-shell d-flex">
    <aside class="sidebar p-3"><nav class="nav flex-column"></nav></aside>
    <section class="content-area flex-grow-1">
      <h1 class="page-title mb-3">Ranking</h1>
      <div class="table-responsive bg-white border rounded">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th></th>
              <th>Posição</th>
              <th>Nome do Projeto</th>
              <th>Área do Conhecimento</th>
              <th>Tipo do Projeto</th>
              <th>Orientador</th>
              <th>Coorientador</th>
              <th>Nota do Projeto</th>
            </tr>
          </thead>
          <tbody id="rankingTabela"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/controllers/ranking.controller.js"></script>

</html>
