<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ranking | FECEAC</title>

  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tabelas.css">

  <link rel="stylesheet" href="css/dataTables.bootstrap5.min.css">
</head>

<body>

  <nav class="navbar bg-white border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand text-success" href="painel.html">
        <img src="assets/logos/feceac.jpeg" alt="Logo FECEAC" class="img-fluid" style="max-width: 120px;">
      </a>
      <button id="btnLogout" class="btn btn-outline-danger btn-sm">Sair</button>
    </div>
  </nav>

  <main class="app-shell d-flex">

    <aside class="sidebar p-3">
      <nav class="nav flex-column"></nav>
    </aside>

    <section class="content-area flex-grow-1">

      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="page-title mb-0">Ranking</h1>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#relatorioModal">
          <i class="bi bi-file-earmark-pdf"></i> Gerar Relatório
        </button>
      </div>

      <div class="table-responsive bg-white border rounded">
        <table id="rankingDataTable" class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th></th>
              <th>Posição</th>
              <th>Nome do Projeto</th>
              <th>Código</th>
              <th>Orientador</th>
              <th>Coorientador</th>
              <th>Tipo do Projeto</th>
              <th>Área do Conhecimento</th>
              <th>Nota do Projeto</th>
            </tr>
          </thead>
          <tbody id="rankingTabela"></tbody>
        </table>
      </div>

    </section>

  </main>

  <div class="modal fade" id="relatorioModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title h5">Gerar Relatório PDF</h2>
          <button class="btn-close" data-bs-dismiss="modal" type="button"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label" for="filtroTipoRelatorio">Tipo do Projeto</label>
              <select id="filtroTipoRelatorio" class="form-select">
                <option value="">Todos</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="filtroAreaRelatorio">Área do Conhecimento</label>
              <select id="filtroAreaRelatorio" class="form-select">
                <option value="">Todas</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label d-block">Exibições</label>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkMostrarAlunos" checked>
                <label class="form-check-label" for="chkMostrarAlunos">Mostrar alunos por projeto</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkNotasPorCriterio">
                <label class="form-check-label" for="chkNotasPorCriterio">Notas agrupadas por critério</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkAgruparArea" checked>
                <label class="form-check-label" for="chkAgruparArea">Agrupar por área do conhecimento</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" id="chkMostrarResumo" checked>
                <label class="form-check-label" for="chkMostrarResumo">Página de resumo</label>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label d-block">Ordenação</label>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="ordenacaoRelatorio" id="ordAreaNota" value="area_nota" checked>
                <label class="form-check-label" for="ordAreaNota">Área → Nota geral (decrescente)</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="ordenacaoRelatorio" id="ordNota" value="nota">
                <label class="form-check-label" for="ordNota">Nota geral (decrescente)</label>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal" type="button">Cancelar</button>
          <button id="btnGerarRelatorio" class="btn btn-success" type="button">Visualizar PDF</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/vendor/bootstrap.bundle.min.js"></script>
  <script src="js/vendor/jquery.min.js"></script>
  <script src="js/vendor/dataTables.min.js"></script>
  <script src="js/vendor/dataTables.bootstrap5.min.js"></script>
  <script src="js/vendor/jspdf.umd.min.js"></script>
  <script src="js/vendor/jspdf.plugin.autotable.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/controllers/ranking.controller.js"></script>
</body>

</html>
