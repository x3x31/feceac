<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alunos | FECEAC</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tabelas.css">
</head>
<body>
  <nav class="navbar bg-white border-bottom"><div class="container-fluid"><a class="navbar-brand text-success" href="painel.html"><img src="assets/logos/feceac.jpeg" alt="Logo FECEAC" class="img-fluid" style="max-width: 120px;"></a><button id="btnLogout" class="btn btn-outline-danger btn-sm">Sair</button></div></nav>
  <main class="app-shell d-flex">
    <aside class="sidebar p-3"><nav class="nav flex-column" id="sidebarMenu"></nav></aside>
    <section class="content-area flex-grow-1">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <h1 class="page-title mb-0">Alunos</h1>
        <button class="btn btn-primary" id="btnNovoAluno" type="button">Cadastrar Aluno</button>
      </div>
      <div class="search-grid mb-3">
        <input id="filtroNome" class="form-control filtro-aluno" placeholder="Pesquisar por nome">
        <input id="filtroMatricula" class="form-control filtro-aluno" placeholder="Pesquisar por matrícula">
        <input id="filtroTurma" class="form-control filtro-aluno" placeholder="Pesquisar por turma">
      </div>
      <div class="table-responsive bg-white border rounded">
        <table class="table table-hover align-middle mb-0">
          <thead><tr><th>ID</th><th>Nome</th><th>Matrícula</th><th>Turma</th><th>Turno</th><th>Ações</th></tr></thead>
          <tbody id="alunosTabela"></tbody>
        </table>
      </div>
    </section>
  </main>
  <div class="modal fade" id="alunoModal" tabindex="-1"><div class="modal-dialog"><form id="alunoForm" class="modal-content needs-validation" novalidate><div class="modal-header"><h2 class="modal-title h5">Aluno</h2><button class="btn-close" data-bs-dismiss="modal" type="button"></button></div><div class="modal-body"><input id="id" type="hidden"><input id="nome" class="form-control mb-2" placeholder="Nome completo" required><input id="matricula" class="form-control mb-2" placeholder="Matrícula"><select id="turno" class="form-select mb-2" required><option value="">Selecione o turno</option><option value="MATUTINO">Matutino</option><option value="VESPERTINO">Vespertino</option><option value="INTEGRAL">Integral</option></select><select id="turma" class="form-select mb-2" disabled required><option value="">Selecione o turno primeiro</option></select></div><div class="modal-footer"><button class="btn btn-outline-secondary" data-bs-dismiss="modal" type="button">Cancelar</button><button class="btn btn-primary">Salvar</button></div></form></div></div>
  <script src="js/vendor/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/controllers/aluno.controller.js"></script>
</body>
</html>
