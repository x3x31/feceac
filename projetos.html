<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projetos | FECEAC</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tabelas.css">
</head>
<body>
  <nav class="navbar bg-white border-bottom"><div class="container-fluid"><a class="navbar-brand text-success" href="painel.html"><img src="assets/logos/feceac.jpeg" alt="Logo FECEAC" class="img-fluid" style="max-width: 120px;"></a><button id="btnLogout" class="btn btn-outline-danger btn-sm">Sair</button></div></nav>
  <main class="app-shell d-flex">
    <aside class="sidebar p-3"><nav class="nav flex-column"><a class="nav-link" href="painel.html">Painel</a><a class="nav-link active" href="projetos.html">Projetos</a><a class="nav-link" href="usuarios.html">Usuários</a><a class="nav-link" href="avaliacoes.html">Avaliações</a><a class="nav-link" href="areas.html">Áreas</a><a class="nav-link" href="criterios.html">Critérios</a></nav></aside>
    <section class="content-area flex-grow-1">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <h1 class="page-title mb-0">Projetos</h1>
        <a class="btn btn-primary" href="cadastrar-projeto.html">Cadastrar Projeto</a>
      </div>
      <div class="search-grid mb-3">
        <div>
          <label class="form-label form-label-sm mb-1 search-label" for="filtroNome">Nome do Projeto</label>
          <input id="filtroNome" class="form-control form-control-sm filtro-projeto" placeholder="Pesquisar por nome">
        </div>
        <div>
          <label class="form-label form-label-sm mb-1 search-label" for="filtroTipo">Tipo</label>
          <select id="filtroTipo" class="form-select form-select-sm filtro-projeto"></select>
        </div>
        <div>
          <label class="form-label form-label-sm mb-1 search-label" for="filtroArea">Área</label>
          <select id="filtroArea" class="form-select form-select-sm filtro-projeto"></select>
        </div>
        <div>
          <label class="form-label form-label-sm mb-1 search-label" for="filtroOrientadorBusca">Orientador</label>
          <div class="position-relative">
            <input type="hidden" id="filtroOrientador">
            <input id="filtroOrientadorBusca" type="text" class="form-control form-control-sm" placeholder="Todos" autocomplete="off">
            <div id="filtroOrientadorDropdown" class="list-group position-absolute w-100 d-none" style="z-index: 1050; max-height: 250px; overflow-y: auto;"></div>
          </div>
        </div>
      </div>
      <div id="estadoProjetos"></div>
      <div class="table-responsive bg-white border rounded">
        <table class="table table-hover align-middle mb-0">
          <thead><tr><th></th><th class="sortable" data-col="id">ID <span class="sort-icon"></span></th><th class="sortable" data-col="titulo">Projeto <span class="sort-icon"></span></th><th class="sortable" data-col="tipo">Tipo <span class="sort-icon"></span></th><th class="sortable" data-col="area">Área <span class="sort-icon"></span></th><th class="sortable" data-col="orientador">Orientador <span class="sort-icon"></span></th><th class="sortable" data-col="coorientador">Coorientador <span class="sort-icon"></span></th><th class="sortable" data-col="alunos">Alunos <span class="sort-icon"></span></th><th>Ações</th></tr></thead>
          <tbody id="projetosTabela"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="js/vendor/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/controllers/projeto.controller.js"></script>
</body>
</html>
