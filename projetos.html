<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projetos | FECEAC</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tabelas.css">
</head>
<body>
  <nav class="navbar bg-white border-bottom"><div class="container-fluid"><a class="navbar-brand text-success" href="painel.html"><img src="assets/logos/feceac.jpeg" alt="Logo FECEAC" class="img-fluid" style="max-width: 120px;"></a><button id="btnLogout" class="btn btn-outline-danger btn-sm">Sair</button></div></nav>
  <main class="app-shell d-flex">
    <aside class="sidebar p-3"><nav class="nav flex-column"><a class="nav-link" href="painel.html">Painel</a><a class="nav-link active" href="projetos.html">Projetos</a><a class="nav-link" href="usuarios.html">Usuários</a><a class="nav-link" href="avaliacoes.html">Avaliações</a><a class="nav-link" href="areas.html">Áreas</a><a class="nav-link" href="criterios.html">Critérios</a></nav></aside>
    <section class="content-area flex-grow-1">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <h1 class="page-title mb-0">Projetos</h1>
        <a class="btn btn-primary" href="cadastrar-projeto.html">Cadastrar Projeto</a>
      </div>
      <div class="search-grid mb-3">
        <input id="filtroNome" class="form-control filtro-projeto" placeholder="Pesquisar por nome">
        <select id="filtroArea" class="form-select filtro-projeto"></select>
        <select id="filtroOrientador" class="form-select filtro-projeto"></select>
        <input id="filtroAno" type="number" class="form-control filtro-projeto" placeholder="Ano">
      </div>
      <div id="estadoProjetos"></div>
      <div class="table-responsive bg-white border rounded">
        <table class="table table-hover align-middle mb-0">
          <thead><tr><th></th><th>ID</th><th>Ano</th><th>Projeto</th><th>Área</th><th>Orientador</th><th>Alunos</th><th>Ações</th></tr></thead>
          <tbody id="projetosTabela"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/controllers/projeto.controller.js"></script>
</body>
</html>
