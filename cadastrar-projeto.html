<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cadastrar Projeto | FECEAC</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar bg-white border-bottom"><div class="container-fluid"><a class="navbar-brand text-success" href="painel.html"><img src="assets/logos/feceac.jpeg" alt="Logo FECEAC" class="img-fluid" style="max-width: 120px;"></a><button id="btnLogout" class="btn btn-outline-danger btn-sm">Sair</button></div></nav>
  <main class="container py-4">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h1 id="formTitulo" class="page-title mb-4">Cadastrar Projeto</h1>
        <form id="projetoForm" class="needs-validation" novalidate>
          <input type="hidden" id="id">
          <div class="row g-3">
            <div class="col-md-2"><label class="form-label required" for="ano">Ano</label><input id="ano" type="number" class="form-control" required></div>
            <div class="col-md-10"><label class="form-label required" for="titulo">Nome do Projeto</label><input id="titulo" class="form-control" required maxlength="200"></div>
            <div class="col-md-4"><label class="form-label required" for="tipo_projeto_id">Tipo do Projeto</label><select id="tipo_projeto_id" class="form-select" required></select></div>
            <div class="col-md-4"><label class="form-label required" for="area_id">Área do Conhecimento</label><select id="area_id" class="form-select" required></select></div>
            <div class="col-md-4">
              <label class="form-label required" for="orientadorBusca">Orientador</label>
              <div class="position-relative">
                <input type="hidden" id="orientador_id" required>
                <input id="orientadorBusca" type="text" class="form-control" placeholder="Digite para buscar..." autocomplete="off" required>
                <div id="orientadorDropdown" class="list-group position-absolute w-100 d-none" style="z-index: 1050; max-height: 300px; overflow-y: auto;"></div>
              </div>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="coorientadorBusca">Coorientador</label>
              <div class="position-relative">
                <input type="hidden" id="coorientador_id">
                <input id="coorientadorBusca" type="text" class="form-control" placeholder="Digite para buscar..." autocomplete="off">
                <div id="coorientadorDropdown" class="list-group position-absolute w-100 d-none" style="z-index: 1050; max-height: 300px; overflow-y: auto;"></div>
              </div>
            </div>
            <div class="col-12">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="form-label mb-0 required">Alunos</label>
                <div class="d-flex gap-2">
                  <button id="btnBuscarAlunos" class="btn btn-outline-success btn-sm" type="button">Buscar alunos por turma</button>
                  <button id="btnAdicionarAluno" class="btn btn-outline-primary btn-sm" type="button">Adicionar aluno</button>
                </div>
              </div>
              <div id="alunosContainer"></div>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Salvar</button>
            <a class="btn btn-outline-secondary" href="projetos.html">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <div class="modal fade" id="alunosModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title h5">Buscar Alunos por Turma</h2>
          <button class="btn-close" data-bs-dismiss="modal" type="button"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3 mb-3">
            <div class="col-md-4">
              <label class="form-label" for="filtroTurno">Turno</label>
              <select id="filtroTurno" class="form-select">
                <option value="">Selecione o turno</option>
                <option value="MATUTINO">Matutino</option>
                <option value="VESPERTINO">Vespertino</option>
                <option value="INTEGRAL">Integral</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="filtroTurma">Turma</label>
              <select id="filtroTurma" class="form-select" disabled>
                <option value="">Selecione o turno primeiro</option>
              </select>
            </div>
            <div class="col-md-4 d-flex align-items-end">
              <button id="btnFiltrarAlunos" class="btn btn-primary" type="button">Buscar</button>
            </div>
          </div>
          <div id="alunosModalMensagem" class="alert alert-light border text-center d-none">Nenhum aluno encontrado.</div>
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th style="width:40px"><input id="marcarTodosAlunos" type="checkbox" class="form-check-input"></th>
                  <th>Nome</th>
                  <th>Matrícula</th>
                </tr>
              </thead>
              <tbody id="alunosModalTabela"></tbody>
            </table>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal" type="button">Cancelar</button>
          <button id="btnConfirmarAlunos" class="btn btn-primary" type="button">Confirmar seleção</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/controllers/projeto.controller.js"></script>
</body>
</html>
