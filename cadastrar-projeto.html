<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cadastrar Projeto | FECEAC</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar bg-white border-bottom"><div class="container-fluid"><a class="navbar-brand text-success" href="painel.html">FECEAC</a><button id="btnLogout" class="btn btn-outline-danger btn-sm">Sair</button></div></nav>
  <main class="container py-4">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h1 id="formTitulo" class="page-title mb-4">Cadastrar Projeto</h1>
        <form id="projetoForm" class="needs-validation" novalidate>
          <input type="hidden" id="id">
          <div class="row g-3">
            <div class="col-md-2"><label class="form-label required" for="ano">Ano</label><input id="ano" type="number" class="form-control" required></div>
            <div class="col-md-10"><label class="form-label required" for="titulo">Nome do Projeto</label><input id="titulo" class="form-control" required maxlength="200"></div>
            <div class="col-md-6"><label class="form-label required" for="area_id">Área do Conhecimento</label><select id="area_id" class="form-select" required></select></div>
            <div class="col-md-6"><label class="form-label required" for="orientador">Orientador</label><input id="orientador" class="form-control" required maxlength="120"></div>
            <div class="col-md-6"><label class="form-label" for="coorientador">Coorientador</label><input id="coorientador" class="form-control" maxlength="120"></div>
            <div class="col-12">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <label class="form-label mb-0 required">Alunos</label>
                <button id="btnAdicionarAluno" class="btn btn-outline-primary btn-sm" type="button">Adicionar aluno</button>
              </div>
              <div id="alunosContainer"></div>
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button class="btn btn-primary" type="submit">Salvar</button>
            <a class="btn btn-outline-secondary" href="projetos.html">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/controllers/projeto.controller.js"></script>
</body>
</html>
