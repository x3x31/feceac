<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | FECEAC</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">
  <main class="min-vh-100 d-flex align-items-center justify-content-center p-3">
    <section class="card login-card shadow">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <img
              src="assets/logos/feceac-login.jpeg"
              alt="Logo FECEAC"
              class="img-fluid"
              style="max-width: 100%;">
        </div>
        <form id="loginForm" class="needs-validation" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label required">Email</label>
            <input type="email" class="form-control" id="email" required autocomplete="email">
            <div class="invalid-feedback">Informe um email válido.</div>
          </div>
          <div class="mb-4">
            <label for="senha" class="form-label required">Senha</label>
            <input type="password" class="form-control" id="senha" required autocomplete="current-password">
            <div class="invalid-feedback">Informe sua senha.</div>
          </div>
          <button id="btnEntrar" class="btn btn-primary w-100" type="submit">Entrar</button>
        </form>
        <div class="text-center mt-3">
          <button class="btn btn-link text-success" type="button" data-bs-toggle="modal" data-bs-target="#cadastroModal">Criar novo cadastro</button>
        </div>
      </div>
    </section>
  </main>
  <div class="modal fade" id="cadastroModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <form id="cadastroForm" class="modal-content needs-validation" novalidate>
        <div class="modal-header">
          <h2 class="modal-title h5">Novo Cadastro</h2>
          <button class="btn-close" type="button" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="cadastroNome" class="form-label required">Nome</label>
            <input id="cadastroNome" class="form-control" required maxlength="120">
          </div>
          <div class="mb-3">
            <label for="cadastroEmail" class="form-label required">Email</label>
            <input id="cadastroEmail" type="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="cadastroTipo" class="form-label required">Perfil solicitado</label>
            <select id="cadastroTipo" class="form-select" required>
              <option value="Aluno">Aluno</option>
              <option value="Professor">Professor</option>
              <option value="Avaliador">Avaliador</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="cadastroSenha" class="form-label required">Senha</label>
            <input id="cadastroSenha" type="password" class="form-control" required minlength="6" autocomplete="new-password">
          </div>
          <div>
            <label for="confirmarSenha" class="form-label required">Confirmar senha</label>
            <input id="confirmarSenha" type="password" class="form-control" required minlength="6" autocomplete="new-password">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" type="button" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" type="submit">Enviar cadastro</button>
        </div>
      </form>
    </div>
  </div>
  <script src="js/vendor/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/controllers/login.controller.js"></script>
</body>
</html>
