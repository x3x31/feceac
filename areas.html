<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" href="assets/logos/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Áreas | FECEAC</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tabelas.css">
</head>
<body>
  <nav class="navbar bg-white border-bottom"><div class="container-fluid"><a class="navbar-brand text-success" href="painel.html"><img src="assets/logos/feceac.jpeg" alt="Logo FECEAC" class="img-fluid" style="max-width: 120px;"></a><button id="btnLogout" class="btn btn-outline-danger btn-sm">Sair</button></div></nav>
  <main class="app-shell d-flex">
    <aside class="sidebar p-3"><nav class="nav flex-column"><a class="nav-link" href="painel.html">Painel</a><a class="nav-link" href="projetos.html">Projetos</a><a class="nav-link" href="usuarios.html">Usuários</a><a class="nav-link" href="avaliacoes.html">Avaliações</a><a class="nav-link active" href="areas.html">Áreas</a><a class="nav-link" href="criterios.html">Critérios</a></nav></aside>
    <section class="content-area flex-grow-1">
      <div class="d-flex justify-content-between align-items-center mb-3"><h1 class="page-title mb-0">Áreas</h1><button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#areaModal">Nova Área</button></div>
      <div class="search-grid mb-3" style="grid-template-columns: repeat(2, 1fr);">
        <div>
          <label class="form-label form-label-sm mb-1 search-label" for="filtroTipo">Tipo de Projeto</label>
          <select id="filtroTipo" class="form-select form-select-sm filtro-area">
            <option value="">Todos</option>
          </select>
        </div>
      </div>
      <div class="table-responsive bg-white border rounded"><table class="table table-hover mb-0"><thead><tr><th>ID</th><th>Nome</th><th>Tipo do Projeto</th><th>Ações</th></tr></thead><tbody id="areasTabela"></tbody></table></div>
    </section>
  </main>
  <div class="modal fade" id="areaModal" tabindex="-1"><div class="modal-dialog"><form id="areaForm" class="modal-content needs-validation" novalidate><div class="modal-header"><h2 class="modal-title h5">Área</h2><button class="btn-close" data-bs-dismiss="modal" type="button"></button></div><div class="modal-body"><input id="id" type="hidden"><label class="form-label required" for="nome">Nome</label><input id="nome" class="form-control mb-2" required><label class="form-label" for="tipo_projeto_id">Tipo do Projeto</label><select id="tipo_projeto_id" class="form-select"><option value="">Selecione</option></select></div><div class="modal-footer"><button class="btn btn-outline-secondary" data-bs-dismiss="modal" type="button">Cancelar</button><button class="btn btn-primary">Salvar</button></div></form></div></div>
  <script src="js/vendor/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/controllers/area.controller.js"></script>
</body>
</html>
