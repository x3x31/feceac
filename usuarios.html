<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Usuários | FECEAC</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tabelas.css">
</head>
<body>
  <nav class="navbar bg-white border-bottom"><div class="container-fluid"><a class="navbar-brand text-success" href="painel.html">FECEAC</a><button id="btnLogout" class="btn btn-outline-danger btn-sm">Sair</button></div></nav>
  <main class="app-shell d-flex">
    <aside class="sidebar p-3"><nav class="nav flex-column"><a class="nav-link" href="painel.html">Painel</a><a class="nav-link" href="projetos.html">Projetos</a><a class="nav-link active" href="usuarios.html">Usuários</a><a class="nav-link" href="avaliacoes.html">Avaliações</a><a class="nav-link" href="areas.html">Áreas</a><a class="nav-link" href="criterios.html">Critérios</a></nav></aside>
    <section class="content-area flex-grow-1">
      <div class="d-flex justify-content-between align-items-center mb-3"><h1 class="page-title mb-0">Usuários</h1></div>
      <div class="alert alert-info">Cadastros feitos pela tela de login entram como inativos. O Administrador revisa o perfil e ativa o acesso nesta tela.</div>
      <div class="table-responsive bg-white border rounded"><table class="table table-hover mb-0"><thead><tr><th>Nome</th><th>Email</th><th>Tipo</th><th>Ativo</th><th>Ações</th></tr></thead><tbody id="usuariosTabela"></tbody></table></div>
    </section>
  </main>
  <div class="modal fade" id="usuarioModal" tabindex="-1"><div class="modal-dialog"><form id="usuarioForm" class="modal-content needs-validation" novalidate><div class="modal-header"><h2 class="modal-title h5">Usuário</h2><button class="btn-close" data-bs-dismiss="modal" type="button"></button></div><div class="modal-body"><input id="id" type="hidden" required><input id="nome" class="form-control mb-2" placeholder="Nome" required><input id="email" type="email" class="form-control mb-2" placeholder="Email" required><select id="tipo" class="form-select mb-2" required><option>Administrador</option><option>Professor</option><option>Avaliador</option><option>Aluno</option></select><div class="form-check"><input id="ativo" class="form-check-input" type="checkbox"><label for="ativo" class="form-check-label">Ativo</label></div></div><div class="modal-footer"><button class="btn btn-outline-secondary" data-bs-dismiss="modal" type="button">Cancelar</button><button class="btn btn-primary">Salvar</button></div></form></div></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/controllers/usuario.controller.js"></script>
</body>
</html>
