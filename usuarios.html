<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" href="assets/logos/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Usuários | FECEAC</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tabelas.css">
</head>
<body>
  <nav class="navbar bg-white border-bottom"><div class="container-fluid"><a class="navbar-brand text-success" href="painel.html"><img src="assets/logos/feceac.jpeg" alt="Logo FECEAC" class="img-fluid" style="max-width: 120px;"></a><button id="btnLogout" class="btn btn-outline-danger btn-sm">Sair</button></div></nav>
  <main class="app-shell d-flex">
    <aside class="sidebar p-3"><nav class="nav flex-column"><a class="nav-link" href="painel.html">Painel</a><a class="nav-link" href="projetos.html">Projetos</a><a class="nav-link active" href="usuarios.html">Usuários</a><a class="nav-link" href="avaliacoes.html">Avaliações</a><a class="nav-link" href="areas.html">Áreas</a><a class="nav-link" href="criterios.html">Critérios</a></nav></aside>
    <section class="content-area flex-grow-1">
      <div class="d-flex justify-content-between align-items-center mb-3"><h1 class="page-title mb-0">Usuários</h1></div>
      <div class="alert alert-info">Cadastros feitos pela tela de login entram como inativos. O Administrador revisa o perfil e ativa o acesso nesta tela.</div>
      <div class="search-grid mb-3">
        <div>
          <label class="form-label form-label-sm mb-1 search-label" for="filtroNome">Nome</label>
          <input id="filtroNome" class="form-control form-control-sm filtro-usuario" placeholder="Pesquisar por nome">
        </div>
        <div>
          <label class="form-label form-label-sm mb-1 search-label" for="filtroTipo">Tipo</label>
          <select id="filtroTipo" class="form-select form-select-sm filtro-usuario">
            <option value="">Todos</option>
            <option>Administrador</option>
            <option>Professor</option>
            <option>Avaliador</option>
            <option>Aluno</option>
          </select>
        </div>
        <div>
          <label class="form-label form-label-sm mb-1 search-label" for="filtroAtivo">Ativo</label>
          <select id="filtroAtivo" class="form-select form-select-sm filtro-usuario">
            <option value="">Todos</option>
            <option value="true">Sim</option>
            <option value="false">Não</option>
          </select>
        </div>
        <div>
          <label class="form-label form-label-sm mb-1 search-label" for="filtroOrdem">Ordenar por</label>
          <select id="filtroOrdem" class="form-select form-select-sm filtro-usuario">
            <option value="nome">Nome (A-Z)</option>
            <option value="nome_desc">Nome (Z-A)</option>
            <option value="tipo">Tipo</option>
            <option value="email">Email</option>
          </select>
        </div>
      </div>
      <div class="table-responsive bg-white border rounded"><table class="table table-hover mb-0"><thead><tr><th>Nome</th><th>Email</th><th>Tipo</th><th>Ativo</th><th>Ações</th></tr></thead><tbody id="usuariosTabela"></tbody></table></div>
      <div id="usuariosContador" class="text-muted text-end mt-2" style="font-size:.85rem;"></div>
    </section>
  </main>
  <div class="modal fade" id="usuarioModal" tabindex="-1"><div class="modal-dialog"><form id="usuarioForm" class="modal-content needs-validation" novalidate><div class="modal-header"><h2 class="modal-title h5">Usuário</h2><button class="btn-close" data-bs-dismiss="modal" type="button"></button></div><div class="modal-body"><input id="id" type="hidden" required><input id="nome" class="form-control mb-2" placeholder="Nome" required><input id="email" type="email" class="form-control mb-2" placeholder="Email" required><select id="tipo" class="form-select mb-2" required><option>Administrador</option><option>Professor</option><option>Avaliador</option><option>Aluno</option></select><div class="form-check"><input id="ativo" class="form-check-input" type="checkbox"><label for="ativo" class="form-check-label">Ativo</label></div></div><div class="modal-footer"><button class="btn btn-outline-secondary" data-bs-dismiss="modal" type="button">Cancelar</button><button class="btn btn-primary">Salvar</button></div></form></div></div>

  <div class="modal fade" id="ativacaoModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h2 class="modal-title h5" id="ativacaoModalTitle">Gerenciar Acesso de Usuários</h2><button class="btn-close" data-bs-dismiss="modal" type="button"></button></div><div class="modal-body">
    <div class="row g-2 mb-3">
      <div class="col-sm-4">
        <label class="form-label form-label-sm" for="filtroAtivacaoTipo">Tipo</label>
        <select id="filtroAtivacaoTipo" class="form-select form-select-sm">
          <option value="Professor" selected>Professor</option>
          <option>Administrador</option>
          <option>Avaliador</option>
          <option>Aluno</option>
        </select>
      </div>
      <div class="col-sm-4">
        <label class="form-label form-label-sm" for="filtroAtivacaoStatus">Status</label>
        <select id="filtroAtivacaoStatus" class="form-select form-select-sm">
          <option value="false" selected>Inativos</option>
          <option value="true">Ativos</option>
        </select>
      </div>
      <div class="col-sm-4 d-flex align-items-end">
        <div class="form-check">
          <input id="chkSelecionarTodosAtivacao" class="form-check-input" type="checkbox">
          <label for="chkSelecionarTodosAtivacao" class="form-check-label">Selecionar todos</label>
        </div>
      </div>
    </div>
    <div class="table-responsive" style="max-height:400px; overflow-y:auto;">
      <table class="table table-hover table-sm mb-0"><thead class="sticky-top bg-white"><tr><th style="width:40px"></th><th>Nome</th><th>Email</th></tr></thead><tbody id="ativacaoTabela"></tbody></table>
    </div>
    <div id="ativacaoVazio" class="text-muted text-center py-3 d-none">Nenhum usuário encontrado.</div>
  </div><div class="modal-footer"><button class="btn btn-outline-secondary" data-bs-dismiss="modal" type="button">Fechar</button><button id="btnAtivarInativar" class="btn btn-success" disabled>Ativar selecionados</button></div></div></div></div>
  <script src="js/vendor/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/controllers/usuario.controller.js"></script>
</body>
</html>
