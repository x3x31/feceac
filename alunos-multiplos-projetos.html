<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" href="assets/logos/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Alunos em Múltiplos Projetos | FECEAC</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tabelas.css">
  <style>
    .rel-page {
      background: #fff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 1.5rem;
      font-size: .8rem;
    }

    .rel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: .3rem;
    }

    .rel-logo {
      max-width: 70px;
      border-radius: 8px;
    }

    .rel-header-text {
      text-align: center;
      flex: 1;
    }

    .rel-header-text h2 {
      margin: 0;
      font-size: 1.2rem;
      color: #198754;
      font-weight: 700;
    }

    .rel-header-text p {
      margin: 0;
      font-size: .8rem;
      color: #6c757d;
    }

    .rel-divider {
      border-top: 3px solid #198754;
      margin-bottom: .8rem;
    }

    .rel-tabela th {
      background: #f8f9fa;
      font-size: .78rem;
      font-weight: 600;
    }

    .rel-tabela td {
      font-size: .78rem;
      vertical-align: top;
    }

    .rel-tabela .projeto-item {
      margin-bottom: .3rem;
      font-size: .75rem;
    }

    .rel-tabela .projeto-item strong {
      color: #333;
    }

    .rel-tabela .projeto-item .text-muted {
      font-size: .72rem;
    }

    .rel-footer {
      margin-top: .5rem;
      font-size: .72rem;
      color: #6c757d;
      text-align: right;
    }

    @media print {
      @page {
        margin: 10mm;
        size: landscape;
      }

      html, body {
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .navbar, .sidebar, #btnImprimir, .search-grid, #estadoAlunos, #btnLogout {
        display: none !important;
      }

      .app-shell {
        display: block !important;
        margin: 0 !important;
        padding: 0 !important;
      }

      .content-area {
        padding: 0 !important;
        margin: 0 !important;
      }

      .rel-page {
        border: none !important;
        border-radius: 0 !important;
        padding: 0 !important;
        margin: 0 !important;
        max-width: 100% !important;
        box-shadow: none !important;
        page-break-inside: avoid;
      }

      .rel-header {
        margin-bottom: .2rem !important;
      }

      .rel-logo {
        max-width: 55px !important;
      }

      .rel-header-text h2 {
        font-size: 1rem !important;
      }

      .rel-header-text p {
        font-size: .7rem !important;
      }

      .rel-divider {
        margin-bottom: .3rem !important;
      }

      .rel-tabela th {
        font-size: .68rem !important;
        padding: .2rem .3rem !important;
      }

      .rel-tabela td {
        font-size: .68rem !important;
        padding: .2rem .3rem !important;
        line-height: 1.2 !important;
      }

      .rel-tabela .projeto-item {
        font-size: .65rem !important;
        margin-bottom: .15rem !important;
      }

      .rel-footer {
        font-size: .65rem !important;
        margin-top: .3rem !important;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar bg-white border-bottom"><div class="container-fluid"><a class="navbar-brand text-success" href="painel.html"><img src="assets/logos/feceac.jpeg" alt="Logo FECEAC" class="img-fluid" style="max-width: 120px;"></a><button id="btnLogout" class="btn btn-outline-danger btn-sm">Sair</button></div></nav>
  <main class="app-shell d-flex">
    <aside class="sidebar p-3"><nav class="nav flex-column"></nav></aside>
    <section class="content-area flex-grow-1">
      <div class="d-flex flex-wrap justify-content-end align-items-center gap-2 mb-3">
        <button id="btnImprimir" class="btn btn-success">Imprimir</button>
      </div>
      <h1 class="page-title mb-3">Alunos em Múltiplos Projetos</h1>
      <p class="text-muted mb-3">Alunos vinculados a mais de um projeto, com informações detalhadas.</p>
      <div class="search-grid mb-3">
        <div>
          <label class="form-label form-label-sm mb-1 search-label" for="filtroOrdenacao">Ordenar por</label>
          <select id="filtroOrdenacao" class="form-select form-select-sm">
            <option value="aluno">Aluno (A-Z)</option>
            <option value="aluno_desc">Aluno (Z-A)</option>
            <option value="orientador">Orientador (A-Z)</option>
            <option value="orientador_desc">Orientador (Z-A)</option>
            <option value="qtd_projetos">Quantidade de Projetos</option>
          </select>
        </div>
      </div>
      <div id="relContainer" class="d-none">
        <div class="rel-page">
          <div class="rel-header">
            <img src="assets/logos/feceac.jpeg" alt="Logo FECEAC" class="rel-logo">
            <div class="rel-header-text">
              <h2>Alunos em Múltiplos Projetos</h2>
              <p>Feira de Ciências e Arte e Cultura</p>
            </div>
            <img src="assets/logos/logo-feceac.jpeg" alt="Logo FECEAC" class="rel-logo">
          </div>
          <div class="rel-divider"></div>
          <div id="relTotal" style="font-size:.78rem; color:#198754; font-weight:600; margin-bottom:.5rem;"></div>
          <div id="relTabela"></div>
          <div class="rel-footer" id="relFooter"></div>
        </div>
      </div>
      <div id="estadoAlunos"></div>
    </section>
  </main>
  <script src="js/vendor/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/controllers/alunos-multiplos-projetos.controller.js"></script>
</body>
</html>
