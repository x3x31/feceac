<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ficha de Avaliação | FECEAC</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/tabelas.css">
  <link rel="stylesheet" href="css/ficha-avaliacao.css">
</head>
<body>
  <nav class="navbar bg-white border-bottom"><div class="container-fluid"><a class="navbar-brand text-success" href="painel.html"><img src="assets/logos/feceac.jpeg" alt="Logo FECEAC" class="img-fluid" style="max-width: 120px;"></a><button id="btnLogout" class="btn btn-outline-danger btn-sm">Sair</button></div></nav>
  <main class="app-shell d-flex">
    <aside class="sidebar p-3"><nav class="nav flex-column"></nav></aside>
    <section class="content-area flex-grow-1">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
        <h1 class="page-title mb-0">Ficha de Avaliação</h1>
        <button id="btnImprimir" class="btn btn-success">Imprimir</button>
      </div>
      <div class="ficha-filtros mb-3">
        <div class="row g-2">
          <div class="col-md-3">
            <label class="form-label form-label-sm" for="filtroTipo">Tipo do Projeto</label>
            <select id="filtroTipo" class="form-select form-select-sm">
              <option value="">Selecione</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label form-label-sm" for="filtroOrientadorBusca">Orientador</label>
            <div class="position-relative">
              <input type="hidden" id="filtroOrientador">
              <input id="filtroOrientadorBusca" type="text" class="form-control form-control-sm" placeholder="Todos" autocomplete="off">
              <div id="filtroOrientadorDropdown" class="list-group position-absolute w-100 d-none" style="z-index: 1050; max-height: 250px; overflow-y: auto;"></div>
            </div>
          </div>
          <div class="col-md-5">
            <label class="form-label form-label-sm" for="filtroProjetoBusca">Projeto</label>
            <div class="position-relative">
              <input type="hidden" id="projetoId">
              <input id="filtroProjetoBusca" type="text" class="form-control form-control-sm" placeholder="Pesquisar projeto..." autocomplete="off">
              <div id="filtroProjetoDropdown" class="list-group position-absolute w-100 d-none" style="z-index: 1050; max-height: 300px; overflow-y: auto;"></div>
            </div>
          </div>
        </div>
      </div>
      <div id="fichaContainer" class="d-none">
        <div class="ficha-page">
          <div class="ficha-header">
            <img src="assets/logos/feceac.jpeg" alt="Logo FECEAC" class="ficha-logo">
            <div class="ficha-header-text">
              <h2>Ficha de Avaliação</h2>
              <p>Feira de Ciências e Arte e Cultura</p>
            </div>
          </div>
          <div class="ficha-divider"></div>
          <div class="ficha-info">
            <div class="ficha-info-row">
              <span class="ficha-label">Título:</span>
              <span class="ficha-valor" id="fichaTitulo"></span>
            </div>
            <div class="ficha-info-grid">
              <div class="ficha-info-row">
                <span class="ficha-label">Tipo:</span>
                <span class="ficha-valor" id="fichaTipo"></span>
              </div>
              <div class="ficha-info-row">
                <span class="ficha-label">Área:</span>
                <span class="ficha-valor" id="fichaArea"></span>
              </div>
            </div>
            <div class="ficha-info-grid">
              <div class="ficha-info-row">
                <span class="ficha-label">Orientador:</span>
                <span class="ficha-valor" id="fichaOrientador"></span>
              </div>
              <div class="ficha-info-row">
                <span class="ficha-label">Coorientador:</span>
                <span class="ficha-valor" id="fichaCoorientador"></span>
              </div>
            </div>
          </div>
          <div class="ficha-section-title">Critérios de Avaliação</div>
          <div id="fichaCriterios" class="ficha-criterios-lista mb-3"></div>
          <div class="ficha-section-title">Alunos</div>
          <div id="fichaAlunosLinhas" class="ficha-linhas-alunos"></div>
          <div class="ficha-section-title">Observações Gerais</div>
          <div class="ficha-obs">
            <div class="ficha-obs-linha">&nbsp;</div>
            <div class="ficha-obs-linha">&nbsp;</div>
            <div class="ficha-obs-linha">&nbsp;</div>
            <div class="ficha-obs-linha">&nbsp;</div>
          </div>
          <div class="ficha-legenda mt-3">
            <div class="ficha-legenda-titulo">Legenda de Notas:</div>
            <div class="ficha-legendas">
              <div class="ficha-legenda-item"><span class="nota-badge">5</span> Fraco ou Ausente</div>
              <div class="ficha-legenda-item"><span class="nota-badge">6</span> Regular</div>
              <div class="ficha-legenda-item"><span class="nota-badge">7</span> Bom</div>
              <div class="ficha-legenda-item"><span class="nota-badge">8</span> Ótimo</div>
              <div class="ficha-legenda-item"><span class="nota-badge">9</span> Excelente</div>
              <div class="ficha-legenda-item"><span class="nota-badge">10</span> Supera as expectativas</div>
            </div>
          </div>
          <div class="ficha-assinaturas mt-4">
            <div class="ficha-assinatura">
              <div class="ficha-assinatura-linha"></div>
              <span>Avaliador(a)</span>
            </div>
            <div class="ficha-assinatura">
              <div class="ficha-assinatura-linha"></div>
              <span>Data</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script src="js/vendor/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/controllers/ficha-avaliacao.controller.js"></script>
</body>
</html>
